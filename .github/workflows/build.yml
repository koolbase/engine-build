name: Build Koolbase Engines

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version to build (leave empty for all)'
        required: false
        default: ''
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        flutter_version:
          - "3.22.3"
          - "3.27.4"
        arch:
          - "arm64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup depot_tools
        run: |
          set -e
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$PWD/depot_tools" >> $GITHUB_PATH

      - name: Fetch Flutter engine
        run: |
          set -e
          mkdir engine && cd engine
          printf '%s\n' \
            "solutions = [" \
            "  {" \
            "    \"managed\": False," \
            "    \"name\": \"src/flutter\"," \
            "    \"url\": \"https://github.com/flutter/engine.git\"," \
            "    \"custom_deps\": {}," \
            "    \"deps_file\": \"DEPS\"," \
            "    \"safesync_url\": \"\"," \
            "  }," \
            "]" > .gclient
          gclient sync --no-history --shallow
          cd src/flutter
          git fetch origin refs/tags/${{ matrix.flutter_version }}
          git checkout FETCH_HEAD
          cd ../..
          gclient sync --no-history --shallow

      - name: Apply Koolbase patches
        run: |
          set -e
          python3 patch_dart_cc.py

      - name: Fix freetype2 build issue
        run: |
          set -e
          python3 -c "
          path = 'engine/src/flutter/third_party/freetype2/src/gzip/zutil.h'
          with open(path) as f:
              content = f.read()
          content = content.replace('#  define OS_CODE 19', '#  undef OS_CODE\n#  define OS_CODE 19')
          with open(path, 'w') as f:
              f.write(content)
          print('Fixed freetype2 zutil.h')
          "

      - name: Build engine
        run: |
          set -e
          cd engine/src/flutter
          ./tools/gn --runtime-mode=release --no-stripped --mac-cpu=${{ matrix.arch }} --target-os=mac --no-lto --no-prebuilt-dart-sdk
          ./tools/gn --runtime-mode=release --no-stripped --mac-cpu=x64 --target-os=mac --no-lto --no-prebuilt-dart-sdk
          cd ..
          ninja -C out/mac_release_${{ matrix.arch }} macos
          ninja -C out/mac_release_${{ matrix.arch }} gen_snapshot
          ninja -C out/mac_release_${{ matrix.arch }} flutter_patched_sdk
          ninja -C out/mac_release gen_snapshot

      - name: Prepare artifact
        run: |
          set -e
          ln -sf gen_snapshot engine/src/out/mac_release_${{ matrix.arch }}/gen_snapshot_arm64
          DART_SDK_PATH=$(find engine/src/out/mac_release -type d -name dart-sdk 2>/dev/null | head -n 1)
          if [ -z "$DART_SDK_PATH" ]; then
            DART_SDK_PATH=$(find engine/src/out -type d -name dart-sdk 2>/dev/null | head -n 1)
          fi
          if [ -z "$DART_SDK_PATH" ]; then
            DART_SDK_PATH=$(find engine/src/third_party/dart -type d -name dart-sdk 2>/dev/null | head -n 1)
          fi
          if [ -z "$DART_SDK_PATH" ]; then
            echo "❌ dart-sdk not found"
            exit 1
          fi
          mkdir -p engine/src/flutter/prebuilts/macos-x64/
          cp -r "$DART_SDK_PATH" engine/src/flutter/prebuilts/macos-x64/dart-sdk

      - name: Package artifact
        run: |
          set -e
          ARTIFACT_NAME="koolbase-engine-flutter-${{ matrix.flutter_version }}-macos-${{ matrix.arch }}"
          mkdir -p "$ARTIFACT_NAME"
          cp -r engine/src/out/mac_release_${{ matrix.arch }} "$ARTIFACT_NAME/"
          cp -r engine/src/flutter/prebuilts/macos-x64 "$ARTIFACT_NAME/"
          zip -r "$ARTIFACT_NAME.zip" "$ARTIFACT_NAME"
          ls -lh "$ARTIFACT_NAME.zip"

      - name: Upload to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: koolbase-engine-flutter-${{ matrix.flutter_version }}-macos-${{ matrix.arch }}
          path: koolbase-engine-flutter-${{ matrix.flutter_version }}-macos-${{ matrix.arch }}.zip
          retention-days: 7

      - name: Upload to R2 and register with API
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          KOOLBASE_API_URL: ${{ secrets.KOOLBASE_API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          FLUTTER_VERSION: ${{ matrix.flutter_version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -e
          pip install --break-system-packages boto3 requests
          ARTIFACT_NAME="koolbase-engine-flutter-${FLUTTER_VERSION}-macos-${ARCH}"
          ZIP="${ARTIFACT_NAME}.zip"

          # Compute SHA256 + size
          SHA256=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          SIZE=$(stat -f%z "$ZIP")
          echo "sha256=$SHA256 size=$SIZE"

          python3 <<EOF
          import boto3, os, requests, sys

          zip_name = "${ZIP}"
          r2_key = zip_name
          sha256 = "${SHA256}"
          size = int("${SIZE}")
          flutter_version = os.environ["FLUTTER_VERSION"]
          arch = os.environ["ARCH"]
          api_url = os.environ["KOOLBASE_API_URL"].rstrip("/")
          internal_key = os.environ["INTERNAL_API_KEY"]

          # 1. Upload to R2
          s3 = boto3.client(
              's3',
              endpoint_url=f"https://{os.environ['R2_ACCOUNT_ID']}.r2.cloudflarestorage.com",
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              region_name='auto',
          )
          print(f"Uploading {r2_key} to R2...")
          s3.upload_file(zip_name, os.environ['R2_BUCKET'], r2_key)
          print("R2 upload done.")

          # 2. Register engine (draft)
          headers = {"X-Internal-Key": internal_key, "Content-Type": "application/json"}
          payload = {
              "flutter_version": flutter_version,
              "koolbase_revision": 1,
              "platform": "macos",
              "arch": arch,
              "r2_key": r2_key,
              "size_bytes": size,
              "sha256": sha256,
          }
          r = requests.post(f"{api_url}/internal/engines", json=payload, headers=headers, timeout=30)
          if r.status_code == 409:
              print("Engine variant already registered; skipping create.")
              sys.exit(0)
          if r.status_code != 201:
              print(f"Register failed: {r.status_code} {r.text}")
              sys.exit(1)
          engine = r.json()
          engine_id = engine["id"]
          print(f"Registered engine {engine_id} (draft).")

          # 3. Publish it
          r2 = requests.patch(
              f"{api_url}/internal/engines/{engine_id}",
              json={"status": "published"},
              headers=headers, timeout=30,
          )
          if r2.status_code != 200:
              print(f"Publish failed: {r2.status_code} {r2.text}")
              sys.exit(1)
          print(f"Published engine {engine_id}.")
          EOF
